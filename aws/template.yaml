AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Zscaler SVPN -> FortiGate IP feed. Fetches the published Zscaler SVPN
  (Z-Tunnel 2.0) IP list on a schedule and publishes IPv4/IPv6 text files to S3
  for a FortiGate External Threat Feed to consume. Self-contained: the function
  code is embedded in this template, so the deployed stack has no dependency on
  any external repository. Community solution, provided as-is, no warranty, not
  an official Zscaler product.

Parameters:
  ZscalerCloud:
    Type: String
    Default: zscaler.net
    AllowedValues:
      - zscaler.net
      - zscalertwo.net
      - zscalerthree.net
      - zscalerten.net
      - zscalereleven.net
      - zscalertwelve.net
      - zscalerbeta.net
      - zspreview.net
      - zscloud.net
      - zscalergov.us
    Description: Your Zscaler cloud name.
  ScheduleExpression:
    Type: String
    Default: rate(6 hours)
    AllowedPattern: '^(rate|cron)\(.+\)$'
    ConstraintDescription: >-
      Must be an EventBridge schedule expression, e.g. rate(6 hours) or
      cron(0 */6 * * ? *).
    Description: How often to refresh the feed (EventBridge schedule expression).
  ExposureMode:
    Type: String
    Default: PublicRead
    AllowedValues:
      - PublicRead
      - CloudFront
    Description: >-
      PublicRead = serve the two files directly from S3 over HTTPS (simplest).
      CloudFront = keep the bucket fully private and serve via CloudFront+OAC.
  MinExpected:
    Type: Number
    Default: 10
    MinValue: 1
    Description: Refuse to publish if fewer than this many valid IPs are found.
  Categories:
    Type: String
    Default: svpn
    AllowedPattern: '^[a-z]+(,[a-z]+)*$'
    Description: >-
      Comma-separated list of feed categories to publish: svpn (Z-Tunnel 2.0,
      for routing/PBR exclusion) and/or zpa (ZPA app-connector ranges, for
      security allow-listing). ZPA is currently only supported for the
      zscaler.net and zscalertwo.net clouds; on other clouds the zpa category
      is silently skipped.

Conditions:
  UsePublicRead: !Equals [!Ref ExposureMode, PublicRead]
  UseCloudFront: !Equals [!Ref ExposureMode, CloudFront]

Resources:

  FeedBucket:
    Type: AWS::S3::Bucket
    # Retain on stack delete: the bucket is versioned and holds objects, so an
    # automatic delete would fail and leave the stack in DELETE_FAILED. Empty
    # and remove the bucket manually after deleting the stack if no longer needed.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration: !If
        - UseCloudFront
        - BlockPublicAcls: true
          IgnorePublicAcls: true
          BlockPublicPolicy: true
          RestrictPublicBuckets: true
        - BlockPublicAcls: true
          IgnorePublicAcls: true
          BlockPublicPolicy: false
          RestrictPublicBuckets: false

  PublicReadBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: UsePublicRead
    Properties:
      Bucket: !Ref FeedBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AnonymousReadFeedObjects
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${FeedBucket.Arn}/zscaler/*'

  CloudFrontBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: UseCloudFront
    Properties:
      Bucket: !Ref FeedBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadViaOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FeedBucket.Arn}/zscaler/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: WriteFeedObjects
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${FeedBucket.Arn}/zscaler/*'

  FeedFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          ZSCALER_CLOUD: !Ref ZscalerCloud
          S3_BUCKET: !Ref FeedBucket
          CATEGORIES: !Ref Categories
          MIN_EXPECTED: !Sub '${MinExpected}'
          HTTP_TIMEOUT: '20'
      Code:
        ZipFile: |
          import ipaddress, json, os, ssl, urllib.request
          from datetime import datetime, timezone
          import boto3

          HOST = "config.zscaler.com"
          CLOUDS = {"zscaler.net", "zscalertwo.net", "zscalerthree.net", "zscalerten.net",
                    "zscalereleven.net", "zscalertwelve.net", "zscalerbeta.net",
                    "zspreview.net", "zscloud.net", "zscalergov.us"}
          ZPA_PATHS = {"zscaler.net": "/api/private.zscaler.com/zpa/json",
                       "zscalertwo.net": "/zpatwo.net/zpa"}
          s3 = boto3.client("s3")


          def _fs(node, out):
              if isinstance(node, dict):
                  for k, v in node.items():
                      if k == "svpnIPs" and isinstance(v, list):
                          out += [x for x in v if isinstance(x, str)]
                      else:
                          _fs(v, out)
              elif isinstance(node, list):
                  for i in node:
                      _fs(i, out)
              return out


          def _fz(doc):
              out = []
              for e in (doc.get("content") or []):
                  if isinstance(e, dict) and isinstance(e.get("IPs"), list):
                      out += [x for x in e["IPs"] if isinstance(x, str)]
              return out


          def _fmt(n):
              return str(n.network_address) if n.prefixlen == n.max_prefixlen else str(n)


          def _split(ips):
              v4, v6 = set(), set()
              for e in ips:
                  e = e.strip()
                  if not e:
                      continue
                  try:
                      o = ipaddress.ip_network(e, strict=False)
                  except ValueError:
                      continue
                  if o.prefixlen == 0:
                      continue
                  (v4 if o.version == 4 else v6).add(o)
              return [_fmt(n) for n in sorted(v4)], [_fmt(n) for n in sorted(v6)]


          def _body(ips, cloud, cat, fam):
              ts = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              return ("# Zscaler %s %s cloud=%s generated=%s count=%d\n" % (cat, fam, cloud, ts, len(ips))) + "\n".join(ips) + "\n"


          def _get(path, to):
              req = urllib.request.Request("https://%s%s" % (HOST, path),
                                            headers={"Accept": "application/json", "User-Agent": "svpn-feed/1.0"})
              with urllib.request.urlopen(req, timeout=to, context=ssl.create_default_context()) as r:
                  raw = r.read(52428801)
              if len(raw) > 52428800:
                  raise RuntimeError("Response exceeded size ceiling")
              return json.loads(raw.decode("utf-8"))


          def _pub(bucket, prefix, cat, cloud, v4, v6, mn):
              if len(v4) + len(v6) < mn:
                  print("Only %d %s IPs found; skipping." % (len(v4) + len(v6), cat))
                  return
              for ips, fam, suf in ((v4, "IPv4", "ipv4"), (v6, "IPv6", "ipv6")):
                  if not ips:
                      print("No %s %s entries this run; feed untouched." % (cat, fam))
                      continue
                  s3.put_object(Bucket=bucket, Key=prefix + suf + ".txt",
                                Body=_body(ips, cloud, cat, fam).encode(),
                                ContentType="text/plain; charset=utf-8", CacheControl="max-age=300")
                  s3.put_object(Bucket=bucket, Key=prefix + suf + "_cisco.txt",
                                Body=("\n".join(ips) + "\n").encode(),
                                ContentType="text/plain; charset=utf-8", CacheControl="max-age=300")


          def handler(event, context):
              cloud = os.environ.get("ZSCALER_CLOUD", "zscaler.net").strip().lower()
              if cloud not in CLOUDS:
                  raise ValueError("Unrecognised Zscaler cloud: %s" % cloud)
              bucket = os.environ["S3_BUCKET"]
              mn = int(os.environ.get("MIN_EXPECTED", "10"))
              to = int(os.environ.get("HTTP_TIMEOUT", "20"))
              cats = {c.strip() for c in os.environ.get("CATEGORIES", "svpn").lower().split(",") if c.strip()}

              if "svpn" in cats:
                  v4, v6 = _split(_fs(_get("/api/%s/cenr/json" % cloud, to), []))
                  if len(v4) + len(v6) < mn:
                      raise RuntimeError("Only %d valid SVPN IPs found; refusing to publish" % (len(v4) + len(v6)))
                  _pub(bucket, "zscaler/svpn_", "SVPN", cloud, v4, v6, 0)

              if "zpa" in cats and cloud in ZPA_PATHS:
                  try:
                      v4, v6 = _split(_fz(_get(ZPA_PATHS[cloud], to)))
                      _pub(bucket, "zscaler/zpa_", "ZPA", cloud, v4, v6, mn)
                  except Exception as e:
                      print("ZPA fetch failed (non-fatal):", e)

  ScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt FeedFunction.Arn
          Id: FeedFunctionTarget

  PermissionForEvents:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FeedFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduleRule.Arn

  InitRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: InvokeFeedFunction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt FeedFunction.Arn

  InitFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt InitRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3, json, urllib.request
          def handler(event, context):
              try:
                  if event["RequestType"] in ("Create", "Update"):
                      boto3.client("lambda").invoke(
                          FunctionName=event["ResourceProperties"]["FunctionName"],
                          InvocationType="Event")
              except Exception as e:
                  print("init invoke (non-fatal):", e)
              body = json.dumps({
                  "Status": "SUCCESS",
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "PhysicalResourceId": event.get("PhysicalResourceId", event["LogicalResourceId"]),
                  "Data": {}
              })
              req = urllib.request.Request(
                  event["ResponseURL"], data=body.encode(), method="PUT",
                  headers={"Content-Type": "", "Content-Length": str(len(body))})
              urllib.request.urlopen(req)

  InitInvoke:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: FeedFunction
    Properties:
      ServiceToken: !GetAtt InitFunction.Arn
      FunctionName: !Ref FeedFunction

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: UseCloudFront
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-svpn-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Condition: UseCloudFront
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Zscaler SVPN feed
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        Origins:
          - Id: s3origin
            DomainName: !GetAtt FeedBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''

Outputs:
  BucketName:
    Description: S3 bucket holding the feed files.
    Value: !Ref FeedBucket
  FeedUrlIPv4:
    Description: >-
      IPv4 feed URL (commented, '#' header). Use for FortiGate, Palo Alto EDL,
      Check Point, and Juniper SRX.
    Value: !If
      - UseCloudFront
      - !Sub 'https://${Distribution.DomainName}/zscaler/svpn_ipv4.txt'
      - !Sub 'https://${FeedBucket.RegionalDomainName}/zscaler/svpn_ipv4.txt'
  FeedUrlIPv6:
    Description: >-
      IPv6 feed URL (commented, '#' header). Use for FortiGate, Palo Alto EDL,
      Check Point, and Juniper SRX.
    Value: !If
      - UseCloudFront
      - !Sub 'https://${Distribution.DomainName}/zscaler/svpn_ipv6.txt'
      - !Sub 'https://${FeedBucket.RegionalDomainName}/zscaler/svpn_ipv6.txt'
  FeedUrlIPv4Cisco:
    Description: >-
      IPv4 feed URL (plain, no comment lines). Use for Cisco Secure Firewall
      Security Intelligence feeds.
    Value: !If
      - UseCloudFront
      - !Sub 'https://${Distribution.DomainName}/zscaler/svpn_ipv4_cisco.txt'
      - !Sub 'https://${FeedBucket.RegionalDomainName}/zscaler/svpn_ipv4_cisco.txt'
  FeedUrlIPv6Cisco:
    Description: >-
      IPv6 feed URL (plain, no comment lines). Use for Cisco Secure Firewall
      Security Intelligence feeds.
    Value: !If
      - UseCloudFront
      - !Sub 'https://${Distribution.DomainName}/zscaler/svpn_ipv6_cisco.txt'
      - !Sub 'https://${FeedBucket.RegionalDomainName}/zscaler/svpn_ipv6_cisco.txt'
  FeedUrlZpaIPv4:
    Description: >-
      ZPA IPv4 feed URL (commented, '#' header), for security allow-listing.
      Only published if 'zpa' is in Categories and the selected cloud
      supports ZPA (currently zscaler.net, zscalertwo.net).
    Value: !If
      - UseCloudFront
      - !Sub 'https://${Distribution.DomainName}/zscaler/zpa_ipv4.txt'
      - !Sub 'https://${FeedBucket.RegionalDomainName}/zscaler/zpa_ipv4.txt'
  FeedUrlZpaIPv6:
    Description: >-
      ZPA IPv6 feed URL (commented, '#' header), for security allow-listing.
      Only published if 'zpa' is in Categories and the selected cloud
      supports ZPA (currently zscaler.net, zscalertwo.net).
    Value: !If
      - UseCloudFront
      - !Sub 'https://${Distribution.DomainName}/zscaler/zpa_ipv6.txt'
      - !Sub 'https://${FeedBucket.RegionalDomainName}/zscaler/zpa_ipv6.txt'
  FeedUrlZpaIPv4Cisco:
    Description: >-
      ZPA IPv4 feed URL (plain, no comment lines), for Cisco Secure Firewall
      Security Intelligence feeds. Same availability caveats as FeedUrlZpaIPv4.
    Value: !If
      - UseCloudFront
      - !Sub 'https://${Distribution.DomainName}/zscaler/zpa_ipv4_cisco.txt'
      - !Sub 'https://${FeedBucket.RegionalDomainName}/zscaler/zpa_ipv4_cisco.txt'
  FeedUrlZpaIPv6Cisco:
    Description: >-
      ZPA IPv6 feed URL (plain, no comment lines), for Cisco Secure Firewall
      Security Intelligence feeds. Same availability caveats as FeedUrlZpaIPv6.
    Value: !If
      - UseCloudFront
      - !Sub 'https://${Distribution.DomainName}/zscaler/zpa_ipv6_cisco.txt'
      - !Sub 'https://${FeedBucket.RegionalDomainName}/zscaler/zpa_ipv6_cisco.txt'
